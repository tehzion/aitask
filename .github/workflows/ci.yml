name: Quality and Security

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Unit and permission tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Verify PWA output
        run: pnpm verify:pwa

      - name: Verify Supabase secure cutover
        run: pnpm verify:supabase
        env:
          AITASK_EXPECT_SECURE_CUTOVER: 'true'

      - name: Browser smoke test
        run: pnpm test:e2e
